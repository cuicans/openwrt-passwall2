name: ImmortalWrt PassWall2 Stable Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ========================
      # 1. 基础环境
      # ========================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget

      # ========================
      # 2. Clone ImmortalWrt（固定路径）
      # ========================
      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt immortalwrt

      # ========================
      # 3. 添加 PassWall2
      # ========================
      - name: Add PassWall2
        run: |
          git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall2 immortalwrt/package/passwall2

      # ========================
      # 4. 更新 feeds
      # ========================
      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ========================
      # 5. 生成默认配置
      # ========================
      - name: Generate config
        run: |
          cd immortalwrt
          make defconfig

      # ========================
      # 6. 编译（稳定模式）
      # ========================
      - name: Build firmware
        run: |
          cd immortalwrt
          make -j1 V=s

      # ========================
      # 7. 上传固件
      # ========================
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-passwall2-firmware
          path: immortalwrt/bin/targets/
