name: ImmortalWrt PassWall2 Stable Build (Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      REPO: immortalwrt

    steps:
      # =========================
      # 1. 基础依赖
      # =========================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget

      # =========================
      # 2. 关闭 Git 认证干扰（关键修复点）
      # =========================
      - name: Fix git environment
        run: |
          git config --global credential.helper ""
          git config --global --unset http.extraheader || true
          git config --global protocol.version 2

      # =========================
      # 3. 克隆 ImmortalWrt
      # =========================
      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt $REPO

      # =========================
      # 4. 创建 package 目录
      # =========================
      - name: Prepare package dir
        run: |
          mkdir -p $REPO/package

      # =========================
      # 5. 添加 PassWall2（稳定写法）
      # =========================
      - name: Add PassWall2
        run: |
          git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall2 $REPO/package/passwall2

      # =========================
      # 6. feeds 更新
      # =========================
      - name: Update feeds
        run: |
          cd $REPO
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # =========================
      # 7. 默认配置
      # =========================
      - name: Generate config
        run: |
          cd $REPO
          make defconfig

      # =========================
      # 8. 编译（稳定模式）
      # =========================
      - name: Build firmware
        run: |
          cd $REPO
          make -j1 V=s

      # =========================
      # 9. 上传固件
      # =========================
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-passwall2-firmware
          path: immortalwrt/bin/targets/
