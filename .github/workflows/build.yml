name: ImmortalWrt PassWall2 Stable Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      REPO: immortalwrt

    steps:
      # =========================
      # 1. 基础依赖
      # =========================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget

      # =========================
      # 2. Clone ImmortalWrt（固定路径）
      # =========================
      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt $REPO

      # =========================
      # 3. 创建 package 目录（关键防炸）
      # =========================
      - name: Prepare directories
        run: |
          mkdir -p $REPO/package

      # =========================
      # 4. 添加 PassWall2（正确方式）
      # =========================
      - name: Add PassWall2
        run: |
          cd $REPO/package
          git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall2

      # =========================
      # 5. 更新 feeds
      # =========================
      - name: Update feeds
        run: |
          cd $REPO
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # =========================
      # 6. 生成默认配置
      # =========================
      - name: Generate config
        run: |
          cd $REPO
          make defconfig

      # =========================
      # 7. 编译（稳定模式）
      # =========================
      - name: Build firmware
        run: |
          cd $REPO
          make -j1 V=s

      # =========================
      # 8. 上传固件
      # =========================
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-passwall2-firmware
          path: immortalwrt/bin/targets/
