name: Stable ImmortalWrt PassWall2 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      REPO_DIR: ${{ github.workspace }}/immortalwrt

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget

      - name: Clone ImmortalWrt (stable branch)
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt $REPO_DIR

      - name: Add PassWall2
        run: |
          git clone --depth=1 https://github.com/xiaorouji/openwrt-passwall2 $REPO_DIR/package/passwall2

      - name: Update feeds (stable)
        run: |
          cd $REPO_DIR
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Make defconfig (IMPORTANT)
        run: |
          cd $REPO_DIR
          make defconfig

      - name: Build firmware
        run: |
          cd $REPO_DIR
          make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-passwall2-firmware
          path: immortalwrt/bin/targets/
